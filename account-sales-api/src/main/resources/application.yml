spring:
  application:
    name: account-sales-api
  
  datasource:
    # Use localhost if running directly via IDE, docker-compose will override this via env vars
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/account_sales}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    baseline-on-migrate: true
    baseline-version: "1"

server:
  port: 8080
